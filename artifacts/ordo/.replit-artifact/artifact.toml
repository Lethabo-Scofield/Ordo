kind = "web"
previewPath = "/"
title = "Ordo"
version = "1.0.0"
id = "artifacts/duna-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23696

[services.development]
run = "pnpm --filter @workspace/ordo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ordo", "run", "build" ]
publicDir = "artifacts/ordo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23696"
BASE_PATH = "/"
